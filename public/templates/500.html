<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Erreur Serveur | MCM</title>
    <link rel="icon" type="image/svg" href="../assets/images/logo/logomcm.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-red: #E60012;
            --white: #FFFFFF;
            --black: #000000;
            --gray: #888888;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--white);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-wrapper {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 500 Cracked Image Visual */
        .error-visual {
            width: 100%;
            max-width: clamp(300px, 60vw, 500px);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .error-visual img {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(230, 0, 18, 0.2));
        }

        /* Error Message text */
        .error-title {
            font-size: clamp(1.5rem, 4vw, 2.25rem);
            font-weight: 700;
            color: var(--white);
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .error-subtitle {
            font-size: clamp(0.875rem, 2.5vw, 1.1rem);
            color: var(--gray);
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        /* Red capsule button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            background: var(--primary-red);
            color: var(--white);
            text-decoration: none;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(230, 0, 18, 0.4);
        }

        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(230, 0, 18, 0.6);
            background: #ff1a2e;
        }

        .back-btn:active {
            transform: translateY(0);
        }

        /* Brand Badge in Bottom Right corner */
        .brand-badge {
            position: fixed;
            bottom: 2.5rem;
            right: 2.5rem;
            display: flex;
            align-items: center;
            font-weight: 900;
            font-size: 1.25rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge-red {
            background: var(--primary-red);
            color: var(--white);
            padding: 0.4rem 0.6rem;
        }

        .badge-black {
            background: #111111;
            color: var(--white);
            padding: 0.4rem 0.6rem;
            border: 1px solid #222222;
        }

        @media (max-width: 480px) {
            .brand-badge {
                bottom: 1.5rem;
                right: 1.5rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="error-wrapper">
        <div class="error-visual">
            <!-- Replace src with your local 500.png when ready -->
            <img src="../assets/images/errors/500.png" alt="500" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 300 120\' fill=\'%23FFFFFF\'><text x=\'20\' y=\'95\' font-size=\'100\' font-weight=\'bold\' font-family=\'sans-serif\'>500</text></svg>'">
        </div>

        <h1 class="error-title">Oops! This Page is Not Working.</h1>
        <p class="error-subtitle">The requested is Internal Server Error.</p>

        <a href="/" class="back-btn">Back to Home</a>
    </div>

    <!-- Brand Badge bottom right -->
    <div class="brand-badge">
        <span class="badge-red">MC</span>
        <span class="badge-black">M</span>
    </div>

</body>
</html>
